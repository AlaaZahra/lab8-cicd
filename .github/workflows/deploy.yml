name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # الدخول لمجلد المشروع
            cd ~/lab8-cicd
            
            # سحب التعديلات الجديدة
            git pull origin main
            
            # تنظيف أي حاويات قديمة لمنع التعارض
            docker compose down
            
            # بناء وتشغيل الحاويات بالنسخة الحديثة (V2)
            docker compose up -d --build
            
            # التأكد من الحالة في الـ Logs (اختياري)
            docker compose ps