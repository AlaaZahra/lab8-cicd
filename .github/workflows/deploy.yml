name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # التأكد من المسار الصحيح ( ubuntu هو اليوزر الافتراضي)
            cd /home/ubuntu/lab8-cicd || cd ~/lab8-cicd
            
            # تحديث الكود مع تجاهل أي تغييرات يدوية قديمة على السيرفر
            git fetch --all
            git reset --hard origin/main
            
            # إعادة تشغيل الحاويات بـ sudo لضمان الصلاحيات الكاملة
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # التأكد إن كل حاجة قايمة تمام
            sudo docker-compose ps